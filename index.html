<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root {
            --accent: #FFD700;
            --bg: #121212;
            --panel: #1e1e1e;
            --mono: 'Courier New', Courier, monospace;
        }
        body {
            background: var(--bg);
            color: #ccc;
            font-family: var(--mono);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* The "HUD" scanline effect */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }
        .header {
            border-bottom: 2px solid var(--accent);
            width: 100%;
            padding: 20px;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        .main-container {
            max-width: 900px;
            padding: 40px;
            border: 1px solid #333;
            margin-top: 50px;
            background: var(--panel);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .pro-badge {
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 2px 8px;
            font-size: 0.8rem;
        }
        .cta-button {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 15px 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .cta-button:hover {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 15px var(--accent);
        }
    </style>
</head>
<body>
    <div class="header">Tyto Sensory Labs // Systems Online</div>
    <div class="main-container">
        <h1>MCP4SH <span class="pro-badge">CODEC PRO</span></h1>
        <p>> INITIALIZING HAPTIC INTERFACE...</p>
        <p>> STATUS: OPERATIONAL</p>
        <hr style="border-color: #444;">
        <p>The **Multimodal Communications Protocol for Humanity** (MCP4H) haptics layer. Experience high-fidelity tactile feedback designed for the next generation of simulators.</p>
        <button class="cta-button" onclick="window.location.href='YOUR_LEMON_SQUEEZY_URL'">DEPLOY LICENSE</button>
    </div>
</body>
</html>
